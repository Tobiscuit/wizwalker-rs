name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

# ─────────────────────────────────────────────────────────────
# TIER 1 — Runs on every PR
# Only checks things that work on partial/incomplete code.
# Jules PRs won't compile end-to-end until all 12 are merged,
# so we don't pretend they should.
# ─────────────────────────────────────────────────────────────

  # Format is always checkable regardless of missing types
  fmt:
    name: "PR · Format Check"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

# ─────────────────────────────────────────────────────────────
# TIER 2 — Runs only on push to main (after merging)
# Full validation suite. Windows required for Win32 APIs.
# ─────────────────────────────────────────────────────────────

  check:
    name: "Main · Cargo Check"
    runs-on: windows-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.8.2
      - run: cargo check --workspace --all-targets

  clippy:
    name: "Main · Clippy"
    runs-on: windows-latest
    if: github.event_name == 'push'
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2.8.2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: "Main · Tests"
    runs-on: windows-latest
    if: github.event_name == 'push'
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.8.2
      - run: cargo test --workspace

  audit:
    name: "Main · Security Audit"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
